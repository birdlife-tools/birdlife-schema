name: Release

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## BirdLife Schema v${{ steps.version.outputs.version }}

            See [CHANGELOG.md](https://github.com/birdlife-tools/birdlife-schema/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}

      - name: Setup Node.js
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync package.json version
        if: steps.check_tag.outputs.exists == 'false'
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Publish to npm
        if: steps.check_tag.outputs.exists == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update organization README
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ORG_PAT not set, skipping README update"
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"

          # Clone .github repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/birdlife-tools/.github.git org-readme
          cd org-readme

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update version badge in README (badge URL, alt text, and release tag link)
          sed -i "s|v[0-9]*\.[0-9]*\.[0-9]*-green|v${VERSION}-green|g" profile/README.md
          sed -i "s|released-v[0-9]*\.[0-9]*\.[0-9]*|released-v${VERSION}|g" profile/README.md
          sed -i "s|\[!\[v[0-9]*\.[0-9]*\.[0-9]*\]|[![v${VERSION}]|g" profile/README.md
          sed -i "s|/releases/tag/v[0-9]*\.[0-9]*\.[0-9]*|/releases/tag/v${VERSION}|g" profile/README.md

          # Check if there are changes
          if git diff --quiet; then
            echo "No changes to README"
            exit 0
          fi

          # Create branch and PR
          BRANCH="chore/update-schema-v${VERSION}"
          git checkout -b "$BRANCH"
          git add profile/README.md
          git commit -m "Update birdlife-schema version to v${VERSION}"
          git push origin "$BRANCH"

          # Create PR
          gh pr create \
            --repo birdlife-tools/.github \
            --title "Update birdlife-schema to v${VERSION}" \
            --body "Automated update from birdlife-schema release workflow." \
            --head "$BRANCH" \
            --base main
