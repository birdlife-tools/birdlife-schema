name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run validation
        run: npm test

      - name: Check JSON Schema is up to date
        run: |
          npm run generate
          if [ -n "$(git status --porcelain json-schema/)" ]; then
            echo "❌ JSON Schema files are out of date!"
            echo ""
            echo "Changed files:"
            git status --porcelain json-schema/
            echo ""
            echo "Run 'npm run generate' locally and commit the changes."
            exit 1
          fi
          echo "✓ JSON Schema files are up to date"
